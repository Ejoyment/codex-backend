<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - CODEX INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/api.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <button onclick="window.location.href='dashboard.html'" class="flex items-center space-x-2">
                        <div class="w-8 h-8 bg-blue-900 rounded-full flex items-center justify-center">
                            <span class="text-white text-sm font-bold">C</span>
                        </div>
                        <span class="text-xl font-bold text-gray-800">CODEX INC</span>
                    </button>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="window.location.href='dashboard.html'" class="text-gray-600 hover:text-gray-800">
                        ← Back to Dashboard
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="bg-white rounded-lg shadow-md p-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-6">Edit Profile</h1>
            
            <form id="profileForm" class="space-y-6">
                <!-- Profile Picture -->
                <div class="flex items-center space-x-6">
                    <div class="shrink-0">
                        <img id="profilePicture" class="h-24 w-24 object-cover rounded-full border-4 border-gray-200" src="https://via.placeholder.com/150" alt="Profile">
                    </div>
                    <div>
                        <label class="block">
                            <span class="sr-only">Choose profile photo</span>
                            <input type="file" id="photoUpload" accept="image/*" class="block w-full text-sm text-gray-500
                                file:mr-4 file:py-2 file:px-4
                                file:rounded-md file:border-0
                                file:text-sm file:font-semibold
                                file:bg-blue-50 file:text-blue-700
                                hover:file:bg-blue-100
                            "/>
                        </label>
                        <p class="text-sm text-gray-500 mt-1">JPG, PNG or GIF (MAX. 2MB)</p>
                    </div>
                </div>

                <!-- Full Name -->
                <div>
                    <label for="fullName" class="block text-sm font-medium text-gray-700 mb-2">
                        Full Name
                    </label>
                    <input type="text" id="fullName" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>

                <!-- Email (readonly) -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                        Email Address
                    </label>
                    <input type="email" id="email" readonly
                        class="w-full px-4 py-2 border border-gray-300 rounded-md bg-gray-50 cursor-not-allowed">
                    <p class="text-sm text-gray-500 mt-1">Email cannot be changed</p>
                </div>

                <!-- Change Password Section -->
                <div class="border-t pt-6">
                    <h2 class="text-xl font-bold text-gray-800 mb-4">Change Password</h2>
                    <p class="text-sm text-gray-600 mb-4">Leave blank if you don't want to change your password</p>
                    
                    <div class="space-y-4">
                        <div>
                            <label for="currentPassword" class="block text-sm font-medium text-gray-700 mb-2">
                                Current Password
                            </label>
                            <input type="password" id="currentPassword"
                                class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        </div>

                        <div>
                            <label for="newPassword" class="block text-sm font-medium text-gray-700 mb-2">
                                New Password
                            </label>
                            <input type="password" id="newPassword"
                                class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        </div>

                        <div>
                            <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-2">
                                Confirm New Password
                            </label>
                            <input type="password" id="confirmPassword"
                                class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        </div>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="flex space-x-4 pt-6">
                    <button type="submit" class="flex-1 bg-blue-600 text-white px-6 py-3 rounded-md hover:bg-blue-700 font-medium">
                        Save Changes
                    </button>
                    <button type="button" onclick="window.location.href='dashboard.html'" 
                        class="flex-1 bg-gray-300 text-gray-700 px-6 py-3 rounded-md hover:bg-gray-400 font-medium">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Check if user is logged in
        const token = localStorage.getItem('authToken');
        if (!token) {
            window.location.href = 'sign_in.html';
        }

        // Load user data
        async function loadUserData() {
            try {
                const result = await api.getCurrentUser(token);
                
                if (result.success) {
                    const user = result.user;
                    document.getElementById('fullName').value = user.fullName;
                    document.getElementById('email').value = user.email;
                    
                    // Fix profile picture URL
                    if (user.profilePicture) {
                        let avatarUrl = user.profilePicture;
                        if (avatarUrl.startsWith('/uploads/')) {
                            avatarUrl = `https://codex-backend-7utu.onrender.com${avatarUrl}`;
                        }
                        document.getElementById('profilePicture').src = avatarUrl;
                    } else {
                        document.getElementById('profilePicture').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.fullName)}&background=3b82f6&color=fff`;
                    }
                } else {
                    alert('Failed to load user data');
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                console.error('Error loading user data:', error);
                alert('Session expired. Please sign in again.');
                window.location.href = 'sign_in.html';
            }
        }

        // Handle photo upload preview
        document.getElementById('photoUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('profilePicture').src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // Handle form submission
        document.getElementById('profileForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const photoFile = document.getElementById('photoUpload').files[0];
            
            try {
                // Upload photo if selected
                if (photoFile) {
                    const formData = new FormData();
                    formData.append('profilePhoto', photoFile);
                    
                    const uploadResponse = await fetch('https://codex-backend-7utu.onrender.com/api/auth/upload-photo', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        },
                        body: formData
                    });
                    
                    const uploadResult = await uploadResponse.json();
                    if (!uploadResult.success) {
                        alert('Failed to upload photo: ' + uploadResult.message);
                        return;
                    }
                }
                
                // Update profile name
                const profileResponse = await fetch('https://codex-backend-7utu.onrender.com/api/auth/update-profile', {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ fullName })
                });
                
                const profileResult = await profileResponse.json();
                if (!profileResult.success) {
                    alert('Failed to update profile: ' + profileResult.message);
                    return;
                }
                
                // Change password if attempted
                if (newPassword || confirmPassword) {
                    if (!currentPassword) {
                        alert('Please enter your current password');
                        return;
                    }
                    if (newPassword !== confirmPassword) {
                        alert('New passwords do not match');
                        return;
                    }
                    if (newPassword.length < 6) {
                        alert('New password must be at least 6 characters');
                        return;
                    }
                    
                    const passwordResponse = await fetch('https://codex-backend-7utu.onrender.com/api/auth/change-password', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ currentPassword, newPassword })
                    });
                    
                    const passwordResult = await passwordResponse.json();
                    if (!passwordResult.success) {
                        alert('Failed to change password: ' + passwordResult.message);
                        return;
                    }
                }
                
                alert('Profile updated successfully!');
                window.location.href = 'dashboard.html';
                
            } catch (error) {
                console.error('Update error:', error);
                alert('Error updating profile. Please try again.');
            }
        });

        // Load data on page load
        loadUserData();
    </script>
</body>
</html>
