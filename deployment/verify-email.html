<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify your Email - CODEX INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/api.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'navy': '#1e3a8a',
                        'navy-light': '#3b82f6',
                        'gray-bg': '#c5c5c5'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-bg min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Verification Card -->
        <div class="bg-white rounded-lg shadow-lg p-8">
            <!-- Header -->
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center space-x-2">
                    <div class="w-8 h-8 bg-navy rounded-full flex items-center justify-center">
                        <span class="text-white text-sm font-bold">C</span>
                    </div>
                    <span class="text-base font-semibold text-gray-700">CODEX INC</span>
                </div>
                <div class="flex space-x-1">
                    <div class="w-3 h-3 bg-red-500 rounded-full"></div>
                    <div class="w-3 h-3 bg-yellow-500 rounded-full"></div>
                    <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                </div>
            </div>

            <!-- Content -->
            <div class="text-center">
                <h2 class="text-2xl font-semibold text-gray-800 mb-3">Verify your Email</h2>
                <p class="text-sm text-gray-600 mb-8">We've sent a verification code to your email address</p>
                
                <!-- Code Input Form -->
                <form id="otpForm" class="mb-8">
                    <div class="flex justify-center space-x-3 mb-8">
                        <input type="text" maxlength="1" id="otp1" class="w-14 h-14 text-center border border-gray-300 rounded-lg text-xl font-semibold focus:outline-none focus:ring-2 focus:ring-navy focus:border-transparent bg-white" required>
                        <input type="text" maxlength="1" id="otp2" class="w-14 h-14 text-center border border-gray-300 rounded-lg text-xl font-semibold focus:outline-none focus:ring-2 focus:ring-navy focus:border-transparent bg-white" required>
                        <input type="text" maxlength="1" id="otp3" class="w-14 h-14 text-center border border-gray-300 rounded-lg text-xl font-semibold focus:outline-none focus:ring-2 focus:ring-navy focus:border-transparent bg-white" required>
                        <input type="text" maxlength="1" id="otp4" class="w-14 h-14 text-center border border-gray-300 rounded-lg text-xl font-semibold focus:outline-none focus:ring-2 focus:ring-navy focus:border-transparent bg-white" required>
                    </div>

                    <!-- Verify Button -->
                    <button type="submit" class="w-full bg-navy text-white py-3 px-4 rounded-lg font-medium hover:bg-blue-800 transition-colors">
                        Verify Email
                    </button>
                </form>

                <!-- Resend Link -->
                <p class="text-sm text-gray-500">
                    Didn't receive the code? <a href="#" id="resendLink" class="text-navy hover:underline font-medium">Resend</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // Get email from session storage
        const userEmail = sessionStorage.getItem('userEmail');
        
        if (!userEmail) {
            alert('Session expired. Please sign up again.');
            window.location.href = 'signup.html';
        }

        // Auto-focus next input when typing
        const inputs = document.querySelectorAll('input[maxlength="1"]');
        
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });

            // Only allow numbers
            input.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
            });
        });

        // Handle form submission
        document.getElementById('otpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const otp = Array.from(inputs).map(input => input.value).join('');
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            if (otp.length !== 4) {
                alert('Please enter the complete 4-digit code');
                return;
            }

            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.textContent = 'Verifying...';
            
            try {
                // Verify OTP with backend
                const result = await api.verifyOTP(userEmail, otp);
                
                if (result.success) {
                    // Store OTP in sessionStorage for success page
                    sessionStorage.setItem('otp', otp);
                    // Redirect to verification success page
                    window.location.href = 'verify-success.html';
                } else {
                    alert(result.message || 'Invalid OTP. Please try again.');
                    // Clear inputs
                    inputs.forEach(input => input.value = '');
                    inputs[0].focus();
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Verify Email';
                }
            } catch (error) {
                console.error('Verification error:', error);
                alert('Network error. Please check if the server is running.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Verify Email';
            }
        });

        // Handle resend link
        document.getElementById('resendLink').addEventListener('click', async (e) => {
            e.preventDefault();
            
            try {
                const result = await api.resendOTP(userEmail);
                
                if (result.success) {
                    alert('Verification code has been resent to your email!');
                    // Clear inputs
                    inputs.forEach(input => input.value = '');
                    inputs[0].focus();
                } else {
                    alert(result.message || 'Error resending code');
                }
            } catch (error) {
                console.error('Resend error:', error);
                alert('Network error. Please try again.');
            }
        });

        // Auto-focus first input on page load
        window.addEventListener('load', () => {
            inputs[0].focus();
        });
    </script>
</body>
</html>
