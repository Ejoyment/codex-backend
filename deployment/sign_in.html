<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - CODEX INC</title>
    <link rel="stylesheet" href="signin.css">
    <script src="js/api.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header Logo -->
        <div class="header">
            <div class="logo">
                                        <div class="logo-icon">
                            C
                        </div>
                <div class="logo-text">
                    <div class="company-name">CODEX INC</div>
                    <div class="company-subtitle">ENTERPRISE PORTAL</div>
                </div>
            </div>
        </div>

        <!-- Sign In Form -->
        <div class="form-container">
            <div class="form-header">
                <h1>Welcome Back</h1>
                <p>Sign in to your account to continue</p>
            </div>

            <form class="signin-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-container">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        <input type="email" id="email" placeholder="name@company.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-container">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <circle cx="12" cy="16" r="1"></circle>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="password" placeholder="••••••••" required>
                        <button type="button" class="toggle-password">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" class="signin-btn">Sign In</button>
            </form>
        </div>

        <!-- Register Link -->
        <div class="register-link">
            <span>Don't have an account?</span>
            <a href="signup.html">Register</a>
        </div>

        <!-- Divider -->
        <div class="divider">
            <span>OR</span>
        </div>

        <!-- Social Login -->
        <div class="social-login">
            <button class="social-btn google-btn">
                <svg class="social-icon" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Google
            </button>
            <button class="social-btn facebook-btn">
                <svg class="social-icon" viewBox="0 0 24 24" fill="#1877F2">
                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
                Facebook
            </button>
        </div>
    </div>

    <script>
        // Handle sign in form submission
        document.querySelector('.signin-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = e.target.querySelector('.signin-btn');
            
            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing In...';
            
            try {
                const result = await api.signin(email, password);
                
                console.log('Sign in result:', result); // Debug log
                
                if (result.success) {
                    // Store token
                    localStorage.setItem('authToken', result.token);
                    localStorage.setItem('user', JSON.stringify(result.user));
                    
                    console.log('Redirecting...'); // Debug log
                    console.log('Token saved:', localStorage.getItem('authToken') ? 'Yes' : 'No');
                    
                    // Check onboarding status and redirect accordingly
                    setTimeout(() => {
                        if (result.user.onboardingCompleted) {
                            window.location.href = 'dashboard.html';
                        } else {
                            window.location.href = 'onboarding.html';
                        }
                    }, 100);
                } else {
                    if (result.requiresVerification) {
                        // User needs to verify email
                        if (confirm(result.message + '\n\nWould you like to verify your email now?')) {
                            sessionStorage.setItem('userEmail', result.email);
                            
                            // Send OTP
                            const otpResult = await api.sendOTP(result.email);
                            if (otpResult.success) {
                                window.location.href = 'verify-email.html';
                            } else {
                                alert('Error sending verification code');
                            }
                        }
                    } else {
                        alert(result.message || 'Sign in failed');
                    }
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Sign In';
                }
            } catch (error) {
                console.error('Sign in error:', error);
                alert('Network error. Please check if the server is running.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });

        // Handle Google sign in
        document.querySelector('.google-btn').addEventListener('click', () => {
            window.location.href = SOCIAL_AUTH.google;
        });

        // Handle Facebook sign in
        document.querySelector('.facebook-btn').addEventListener('click', () => {
            window.location.href = SOCIAL_AUTH.facebook;
        });

        // Toggle password visibility
        document.querySelector('.toggle-password').addEventListener('click', () => {
            const passwordInput = document.getElementById('password');
            passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
        });
    </script>
</body>
</html>
