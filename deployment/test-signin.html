<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Sign In</title>
    <script src="js/api.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .log {
            background: #f5f5f5;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
        }
        button {
            background: #1e3a8a;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Sign In Test Page</h1>
    
    <div>
        <h3>Test Sign In</h3>
        <input type="email" id="email" placeholder="Email" value="">
        <input type="password" id="password" placeholder="Password" value="">
        <button onclick="testSignIn()">Test Sign In</button>
    </div>

    <div>
        <h3>Quick Tests</h3>
        <button onclick="testBackend()">Test Backend Connection</button>
        <button onclick="checkLocalStorage()">Check LocalStorage</button>
        <button onclick="testDashboard()">Go to Dashboard</button>
    </div>

    <div>
        <h3>Console Log:</h3>
        <div id="log"></div>
    </div>

    <script>
        function log(message, data = null) {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log';
            entry.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong>: ${message}`;
            if (data) {
                entry.innerHTML += `<br><pre>${JSON.stringify(data, null, 2)}</pre>`;
            }
            logDiv.insertBefore(entry, logDiv.firstChild);
            console.log(message, data);
        }

        async function testBackend() {
            log('Testing backend connection...');
            try {
                const response = await fetch('http://localhost:3000/api/health');
                const data = await response.json();
                log('✅ Backend is running!', data);
            } catch (error) {
                log('❌ Backend connection failed!', error.message);
            }
        }

        async function testSignIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                log('❌ Please enter email and password');
                return;
            }

            log('Attempting sign in...', { email });

            try {
                const result = await api.signin(email, password);
                log('Sign in response:', result);

                if (result.success) {
                    log('✅ Sign in successful!');
                    localStorage.setItem('authToken', result.token);
                    localStorage.setItem('user', JSON.stringify(result.user));
                    log('Token and user saved to localStorage');
                    
                    log('Redirecting to dashboard in 2 seconds...');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 2000);
                } else {
                    log('❌ Sign in failed:', result.message);
                }
            } catch (error) {
                log('❌ Error during sign in:', error.message);
            }
        }

        function checkLocalStorage() {
            const token = localStorage.getItem('authToken');
            const user = localStorage.getItem('user');
            
            log('LocalStorage contents:', {
                hasToken: !!token,
                token: token ? token.substring(0, 20) + '...' : null,
                user: user ? JSON.parse(user) : null
            });
        }

        function testDashboard() {
            log('Navigating to dashboard...');
            window.location.href = 'dashboard.html';
        }

        // Auto-test backend on load
        window.onload = () => {
            log('Page loaded');
            testBackend();
            checkLocalStorage();
        };
    </script>
</body>
</html>
