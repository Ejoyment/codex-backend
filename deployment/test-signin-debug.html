<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In Debug - CODEX INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/api.js"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-8">
        <h1 class="text-2xl font-bold mb-6">Sign In Debug Tool</h1>
        
        <form id="debugForm" class="space-y-4 mb-8">
            <div>
                <label class="block text-sm font-medium mb-2">Email</label>
                <input type="email" id="email" value="layefaebono@gmail.com" class="w-full px-4 py-2 border rounded-lg">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Password</label>
                <input type="password" id="password" class="w-full px-4 py-2 border rounded-lg">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">
                Test Sign In
            </button>
        </form>

        <div id="results" class="space-y-4"></div>
    </div>

    <script>
        document.getElementById('debugForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resultsDiv = document.getElementById('results');
            
            resultsDiv.innerHTML = '<div class="text-blue-600">Testing sign in...</div>';
            
            try {
                const result = await api.signin(email, password);
                
                let html = '<div class="border rounded-lg p-4 bg-gray-50">';
                html += '<h2 class="font-bold text-lg mb-4">Sign In Response:</h2>';
                html += '<pre class="bg-white p-4 rounded overflow-auto text-sm">' + JSON.stringify(result, null, 2) + '</pre>';
                html += '</div>';
                
                if (result.success) {
                    localStorage.setItem('authToken', result.token);
                    
                    html += '<div class="border rounded-lg p-4 bg-blue-50 mt-4">';
                    html += '<h3 class="font-bold mb-2">Onboarding Check:</h3>';
                    html += '<p>onboardingCompleted: <strong>' + result.user.onboardingCompleted + '</strong></p>';
                    html += '<p>Type: <strong>' + typeof result.user.onboardingCompleted + '</strong></p>';
                    html += '<p>Is exactly false: <strong>' + (result.user.onboardingCompleted === false) + '</strong></p>';
                    html += '<p>Is falsy: <strong>' + (!result.user.onboardingCompleted) + '</strong></p>';
                    html += '</div>';
                    
                    html += '<div class="border rounded-lg p-4 bg-green-50 mt-4">';
                    html += '<h3 class="font-bold mb-2">Redirect Decision:</h3>';
                    if (result.user.onboardingCompleted) {
                        html += '<p class="text-green-700">Would redirect to: <strong>dashboard.html</strong></p>';
                    } else {
                        html += '<p class="text-blue-700">Would redirect to: <strong>onboarding.html</strong></p>';
                    }
                    html += '</div>';
                    
                    // Test /me endpoint
                    html += '<div class="border rounded-lg p-4 bg-yellow-50 mt-4">';
                    html += '<h3 class="font-bold mb-2">Testing /api/auth/me endpoint...</h3>';
                    html += '<p id="meTest">Loading...</p>';
                    html += '</div>';
                    
                    resultsDiv.innerHTML = html;
                    
                    // Test /me endpoint
                    const meResult = await api.getCurrentUser(result.token);
                    document.getElementById('meTest').innerHTML = '<pre class="bg-white p-4 rounded overflow-auto text-sm mt-2">' + JSON.stringify(meResult, null, 2) + '</pre>';
                    
                    // Add manual redirect buttons
                    html = resultsDiv.innerHTML;
                    html += '<div class="flex gap-4 mt-4">';
                    html += '<button onclick="window.location.href=\'onboarding.html\'" class="flex-1 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">Go to Onboarding</button>';
                    html += '<button onclick="window.location.href=\'dashboard.html\'" class="flex-1 bg-gray-600 text-white py-2 rounded-lg hover:bg-gray-700">Go to Dashboard</button>';
                    html += '</div>';
                    resultsDiv.innerHTML = html;
                }
                
            } catch (error) {
                resultsDiv.innerHTML = '<div class="border rounded-lg p-4 bg-red-50">';
                resultsDiv.innerHTML += '<h2 class="font-bold text-lg mb-2 text-red-700">Error:</h2>';
                resultsDiv.innerHTML += '<pre class="bg-white p-4 rounded overflow-auto text-sm">' + error.toString() + '</pre>';
                resultsDiv.innerHTML += '</div>';
            }
        });
    </script>
</body>
</html>
