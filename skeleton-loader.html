<!-- Skeleton Loader Component - Include this at the start of body tag -->
<style>
    .page-skeleton {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #f8fafc;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .skeleton-pulse {
        background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
        background-size: 200% 100%;
        animation: skeleton-pulse 1.5s ease-in-out infinite;
        border-radius: 8px;
    }

    @keyframes skeleton-pulse {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
    }

    body.loaded .page-skeleton {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease-out;
    }

    body:not(.loaded) > *:not(.page-skeleton):not(script):not(style) {
        opacity: 0;
    }

    body.loaded > *:not(.page-skeleton) {
        opacity: 1;
        transition: opacity 0.3s ease-in;
    }
</style>

<div class="page-skeleton" id="pageSkeleton">
    <div style="text-align: center;">
        <!-- Animated Logo -->
        <div style="width: 64px; height: 64px; margin: 0 auto 24px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 16px; display: flex; align-items: center; justify-content: center; animation: pulse 2s ease-in-out infinite;">
            <span style="color: white; font-size: 32px; font-weight: bold;">C</span>
        </div>
        <!-- Loading Text -->
        <div style="color: #64748b; font-size: 14px; font-weight: 500;">Loading CODEX INC...</div>
        <!-- Loading Bar -->
        <div style="width: 200px; height: 4px; background: #e2e8f0; border-radius: 2px; margin: 16px auto 0; overflow: hidden;">
            <div style="width: 100%; height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); animation: loading-bar 1.5s ease-in-out infinite;"></div>
        </div>
    </div>
</div>

<style>
    @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.8; }
    }

    @keyframes loading-bar {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
    }
</style>

<script>
    // Hide skeleton when page is fully loaded
    window.addEventListener('load', function() {
        setTimeout(function() {
            document.body.classList.add('loaded');
            setTimeout(function() {
                var skeleton = document.getElementById('pageSkeleton');
                if (skeleton) skeleton.remove();
            }, 300);
        }, 200);
    });

    // Fallback: Hide after 3 seconds even if load event doesn't fire
    setTimeout(function() {
        if (!document.body.classList.contains('loaded')) {
            document.body.classList.add('loaded');
        }
    }, 3000);
</script>
