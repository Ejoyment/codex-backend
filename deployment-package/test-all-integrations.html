<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test All Integrations - CODEX INC</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">Integration Test Dashboard</h1>
        
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">Test Results</h2>
            <div id="results" class="space-y-3"></div>
        </div>

        <button onclick="runAllTests()" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
            Run All Tests
        </button>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        const token = localStorage.getItem('authToken');

        if (!token) {
            alert('Please login first');
            window.location.href = 'sign_in.html';
        }

        function addResult(platform, status, message, data = null) {
            const resultsDiv = document.getElementById('results');
            const statusColor = status === 'success' ? 'green' : status === 'error' ? 'red' : 'yellow';
            const statusIcon = status === 'success' ? '✓' : status === 'error' ? '✗' : '⚠';
            
            const resultHTML = `
                <div class="border-l-4 border-${statusColor}-500 bg-${statusColor}-50 p-4 rounded">
                    <div class="flex items-start">
                        <span class="text-2xl mr-3">${statusIcon}</span>
                        <div class="flex-1">
                            <h3 class="font-semibold text-${statusColor}-800">${platform}</h3>
                            <p class="text-sm text-${statusColor}-700">${message}</p>
                            ${data ? `<pre class="text-xs mt-2 bg-white p-2 rounded overflow-auto max-h-40">${JSON.stringify(data, null, 2)}</pre>` : ''}
                        </div>
                    </div>
                </div>
            `;
            
            resultsDiv.innerHTML += resultHTML;
        }

        async function testGitHub() {
            try {
                const response = await fetch(`${API_URL}/github/repos`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success && data.repos && data.repos.length > 0) {
                    addResult('GitHub', 'success', `Found ${data.repos.length} repositories`, data.repos.slice(0, 3));
                } else if (data.success && data.repos && data.repos.length === 0) {
                    addResult('GitHub', 'warning', 'Connected but no repositories found');
                } else {
                    addResult('GitHub', 'error', data.message || 'Failed to fetch repos');
                }
            } catch (error) {
                addResult('GitHub', 'error', error.message);
            }
        }

        async function testDiscord() {
            try {
                const response = await fetch(`${API_URL}/discord/guilds`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success && data.guilds && data.guilds.length > 0) {
                    addResult('Discord', 'success', `Found ${data.guilds.length} servers`, data.guilds.slice(0, 3));
                } else if (data.success && data.guilds && data.guilds.length === 0) {
                    addResult('Discord', 'warning', 'Connected but no servers found');
                } else {
                    addResult('Discord', 'error', data.message || 'Failed to fetch guilds');
                }
            } catch (error) {
                addResult('Discord', 'error', error.message);
            }
        }

        async function testSlack() {
            try {
                const response = await fetch(`${API_URL}/slack/team`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    addResult('Slack', 'success', 'Connected successfully', data.team);
                } else {
                    addResult('Slack', 'error', data.message || 'Not connected');
                }
            } catch (error) {
                addResult('Slack', 'error', error.message);
            }
        }

        async function testNotion() {
            try {
                const response = await fetch(`${API_URL}/notion/search?query=`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    addResult('Notion', 'success', 'Connected successfully', { resultsCount: data.results?.length || 0 });
                } else {
                    addResult('Notion', 'error', data.message || 'Not connected');
                }
            } catch (error) {
                addResult('Notion', 'error', error.message);
            }
        }

        async function testFigma() {
            try {
                const response = await fetch(`${API_URL}/figma/user`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    addResult('Figma', 'success', 'Connected successfully', data.user);
                } else {
                    addResult('Figma', 'error', data.message || 'Not connected');
                }
            } catch (error) {
                addResult('Figma', 'error', error.message);
            }
        }

        async function testDashboardData() {
            try {
                const response = await fetch(`${API_URL}/dashboard/data`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    addResult('Dashboard API', 'success', `Tier: ${data.data.tier}, Connected: ${data.data.connectedIntegrations.length}`, {
                        tier: data.data.tier,
                        integrations: data.data.connectedIntegrations,
                        stats: data.data.stats
                    });
                } else {
                    addResult('Dashboard API', 'error', data.message);
                }
            } catch (error) {
                addResult('Dashboard API', 'error', error.message);
            }
        }

        async function runAllTests() {
            document.getElementById('results').innerHTML = '<p class="text-gray-600">Running tests...</p>';
            
            await testDashboardData();
            await testGitHub();
            await testDiscord();
            await testSlack();
            await testNotion();
            await testFigma();
            
            console.log('All tests completed!');
        }

        // Auto-run on load
        window.addEventListener('load', () => {
            setTimeout(runAllTests, 500);
        });
    </script>
</body>
</html>
